<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tra cứu trạng thái đơn hàng của bạn tại Phúc Gia Tiên. Nhập số điện thoại hoặc mã đơn hàng để xem tiến độ giao nhận.">
  <title>Theo Dõi Đơn Hàng – Phúc Gia Tiên</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/checkout.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="assets/images/logo.png" type="image/png">

  <style>
    /* Custom Styling for Tracking Page */
    .tracking-section {
      background-color: #faf7f2;
      padding: var(--space-12) 0 var(--space-20);
      min-height: 70vh;
    }

    .tracking-card {
      background: #ffffff;
      border-radius: var(--radius-xl);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
      padding: var(--space-8);
      border: 1px solid rgba(200, 146, 42, 0.12);
      margin-bottom: var(--space-8);
      max-width: 720px;
      margin-left: auto;
      margin-right: auto;
    }

    .tracking-title {
      font-family: var(--font-heading);
      font-size: var(--fs-3xl);
      color: #2c1a0c;
      text-align: center;
      margin-bottom: var(--space-2);
    }

    .tracking-desc {
      text-align: center;
      color: #6b4c2e;
      margin-bottom: var(--space-8);
      font-size: var(--fs-sm);
    }

    /* Form Styles */
    .tracking-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      max-width: 500px;
      margin: 0 auto;
    }

    .tracking-input-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .tracking-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #5c3a1e;
    }

    .tracking-input-wrap {
      position: relative;
      display: flex;
    }

    .tracking-input {
      flex: 1;
      padding: 14px 16px;
      border: 1.5px solid #d4c4b0;
      border-radius: var(--radius-md) 0 0 var(--radius-md);
      font-family: var(--font-body);
      font-size: var(--fs-sm);
      color: #1a0f05;
      background: #fff;
      transition: all 0.25s ease;
    }

    .tracking-input::placeholder {
      color: #8a6a50;
      opacity: 1;
    }

    .tracking-input:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 4px rgba(200, 146, 42, 0.08);
    }

    .tracking-btn-search {
      padding: 0 var(--space-6);
      border: none;
      background: var(--color-primary);
      color: #ffffff;
      font-family: var(--font-body);
      font-weight: 600;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .tracking-btn-search:hover {
      background: var(--color-primary-light);
    }

    /* Orders List Styling */
    .user-orders-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
      max-width: 800px;
      margin: 0 auto;
    }

    .order-summary-card {
      background: #ffffff;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(200, 146, 42, 0.12);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .order-summary-card:hover {
      box-shadow: 0 8px 25px rgba(200, 146, 42, 0.06);
      transform: translateY(-2px);
    }

    .order-summary-header {
      padding: var(--space-4) var(--space-6);
      background: #faf7f2;
      border-bottom: 1px solid rgba(200, 146, 42, 0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-3);
    }

    .order-header-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .order-code-badge {
      font-weight: 700;
      color: var(--color-primary);
      font-size: var(--fs-md);
    }

    .order-date-label {
      font-size: var(--fs-xs);
      color: #705945; /* Dark brown for high contrast on white card */
    }

    .order-badge-status {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .status-pending { background-color: #fef3c7; color: #d97706; }
    .status-confirmed { background-color: #dbeafe; color: #2563eb; }
    .status-packing { background-color: #f3e8ff; color: #7c3aed; }
    .status-shipping { background-color: #e0f2fe; color: #0284c7; }
    .status-delivered { background-color: #d1fae5; color: #059669; }
    .status-cancelled { background-color: #fee2e2; color: #dc2626; }

    .order-summary-body {
      padding: var(--space-5) var(--space-6);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: var(--space-4);
    }

    .order-quick-details p {
      font-size: var(--fs-sm);
      margin-bottom: 4px;
      color: #5a4738; /* Dark brown primary text for high contrast */
    }

    .order-quick-details p:last-child {
      margin-bottom: 0;
    }

    .order-quick-details strong {
      color: #1a0f05; /* Blackish brown for important information */
    }

    .order-total-price {
      text-align: right;
    }

    .order-total-price .label {
      font-size: var(--fs-xs);
      color: #705945; /* Dark brown muted text for high contrast */
      display: block;
      margin-bottom: 2px;
    }

    .order-total-price .price {
      font-size: var(--fs-lg);
      font-weight: 700;
      color: var(--color-accent);
    }

    .order-summary-footer {
      padding: var(--space-4) var(--space-6);
      border-top: 1px dashed rgba(200, 146, 42, 0.1);
      display: flex;
      justify-content: flex-end;
      background: #fff;
    }

    .btn-toggle-details {
      background: none;
      border: 1px solid var(--color-accent);
      color: var(--color-accent);
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: var(--fs-xs);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .btn-toggle-details:hover {
      background: var(--color-accent);
      color: #ffffff;
    }

    /* Order Details (Dark Theme matching order-success.html) */
    .order-details-drawer {
      display: none;
      background: #2a1508;
      color: #ffffff;
      padding: var(--space-6) var(--space-6) var(--space-8);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      animation: slideDown 0.3s ease-out forwards;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .order-details-drawer.active {
      display: block;
    }

    .order-details-drawer .success-order-box {
      border: none;
      background: none;
      padding: 0;
      margin-bottom: 0;
      box-shadow: none;
    }

    .order-details-drawer .success-grid__title {
      color: var(--color-accent);
      border-bottom-color: rgba(255, 255, 255, 0.1);
    }

    .order-details-drawer .success-items-title {
      color: var(--color-accent);
      border-bottom-color: rgba(255, 255, 255, 0.1);
    }

    .order-details-drawer .success-order-total {
      border-top-color: rgba(255, 255, 255, 0.15);
    }

    /* Alert Boxes */
    .tracking-alert {
      padding: var(--space-4) var(--space-5);
      border-radius: var(--radius-md);
      font-size: var(--fs-sm);
      margin-bottom: var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .alert-error {
      background-color: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .alert-info {
      background-color: #eff6ff;
      color: #1e40af;
      border: 1px solid #bfdbfe;
    }

    .alert-success {
      background-color: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    /* Image Modal */
    .img-modal {
      display: none;
      position: fixed;
      z-index: 9999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
    }
    .img-modal-content {
      margin: auto;
      display: block;
      max-width: 90%;
      max-height: 90vh;
      border-radius: var(--radius-md);
      box-shadow: 0 5px 25px rgba(0,0,0,0.5);
    }
    .img-modal-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      transition: 0.3s;
      cursor: pointer;
    }
    .img-modal-close:hover,
    .img-modal-close:focus {
      color: #bbb;
      text-decoration: none;
    }
  </style>
</head>

<body class="page-body">

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <main id="main-content">
    
    <!-- PAGE HERO BANNER -->
    <section class="page-hero" aria-label="Banner trang tra cứu đơn hàng">
      <div class="page-hero__bg">
        <img class="js-config-page-banner-img" src="assets/images/home_bg.jpeg" alt="Tra cứu đơn hàng Phúc Gia Tiên" role="presentation" loading="eager">
      </div>
      <div class="container">
        <div class="page-hero__content">
          <h1 class="page-hero__title">TRA CỨU ĐƠN HÀNG</h1>
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <span class="breadcrumb__item"><a class="breadcrumb__link" href="index.html">Trang Chủ</a></span>
            <span class="breadcrumb__item"><span class="breadcrumb__current">Tra Cứu Đơn Hàng</span></span>
          </nav>
        </div>
      </div>
    </section>

    <!-- MAIN TRACKING SECTION -->
    <section class="tracking-section">
      <div class="container">
        
        <!-- SEARCH BOX CARD (Shown if guest or optional search) -->
        <div class="tracking-card" id="search-card-container">
          <h2 class="tracking-title" id="search-card-title">Tra Cứu Đơn Hàng</h2>
          <p class="tracking-desc" id="search-card-desc">Nhập số điện thoại hoặc mã đơn hàng của bạn để kiểm tra tiến trình giao hàng.</p>
          
          <form class="tracking-form" onsubmit="handleTrackingSearch(event)">
            <div class="tracking-input-group">
              <label class="tracking-label" for="search-query-input">Số điện thoại hoặc Mã đơn hàng</label>
              <div class="tracking-input-wrap">
                <input class="tracking-input" id="search-query-input" type="text" placeholder="Ví dụ: 0986123456 hoặc PGT123456" required>
                <button type="submit" class="tracking-btn-search" id="btn-search-tracking">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                  </svg>
                  <span>Tìm kiếm</span>
                </button>
              </div>
            </div>
          </form>
        </div>

        <!-- NOTIFICATION CONTAINER -->
        <div style="max-width: 800px; margin: 0 auto;" id="notification-area"></div>

        <!-- RESULTS CONTAINER -->
        <div class="user-orders-list" id="tracking-results-container">
          <!-- Populated dynamically -->
        </div>

      </div>
    </section>

  </main>

  <!-- MEDIA MODAL -->
  <div id="product-img-modal" class="img-modal" onclick="closeImgModal(event)">
    <span class="img-modal-close" onclick="closeImgModal(event)">&times;</span>
    <img class="img-modal-content" id="img-modal-target">
  </div>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- SCRIPTS -->
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/common.js"></script>

  <script>
    // ============================================
    // ORDER TRACKING CONTROLLER
    // ============================================
    (function() {
      'use strict';

      // Map status keys to Vietnamese text and CSS classes
      var STATUS_MAP = {
        'pending': { text: 'Chờ xác nhận', cls: 'status-pending' },
        'confirmed': { text: 'Đã xác nhận', cls: 'status-confirmed' },
        'packing': { text: 'Đang đóng gói', cls: 'status-packing' },
        'shipping': { text: 'Đang giao hàng', cls: 'status-shipping' },
        'completed': { text: 'Giao hàng thành công', cls: 'status-delivered' },
        'cancelled': { text: 'Đã huỷ', cls: 'status-cancelled' }
      };

      // Retrieve all orders from localStorage
      function loadAllOrders() {
        try {
          return JSON.parse(localStorage.getItem('pgt_orders') || '[]');
        } catch(e) {
          return [];
        }
      }

      // Format order status history timeline
      function renderTimelineHtml(order) {
        if (order.status === 'cancelled') {
          return '<h3 class="success-timeline-title" style="color: #dc2626;">Đơn Hàng Đã Bị Huỷ</h3>'
            + '<div class="tracking-alert alert-error" style="margin-top: 12px; margin-bottom: 0; background-color: #fee2e2; border-color: #fca5a5; color: #991b1b; padding: 12px 16px; border-radius: var(--radius-md); font-size: var(--fs-sm);">'
            + 'Đơn hàng này đã bị hủy trên hệ thống. Quý khách vui lòng liên hệ hotline của Phúc Gia Tiên để nhận hỗ trợ nhanh chóng nhất.'
            + '</div>';
        }

        var steps = [
          { key: 'pending', label: 'Đặt hàng thành công', defaultNote: 'Đơn hàng đã được tiếp nhận.' },
          { key: 'confirmed', label: 'Đã xác nhận', defaultNote: 'Phúc Gia Tiên đã xác nhận đơn.' },
          { key: 'shipping', label: 'Đang giao hàng', defaultNote: 'Đơn hàng đang trên đường giao đến quý khách.' },
          { key: 'completed', label: 'Giao hàng thành công', defaultNote: 'Cảm ơn quý khách đã mua sắm!' }
        ];

        var currentStep = steps.findIndex(function(s) { return s.key === order.status; });
        if (currentStep === -1) {
          // Fallback mapping for older keys if present
          if (order.status === 'delivered') currentStep = 3;
          else if (order.status === 'packing') currentStep = 1; // map packing close to confirmed
          else currentStep = 0;
        }

        var timelineHtml = '';
        steps.forEach(function(step, idx) {
          var histEntry = (order.statusHistory || []).filter(function(h) { return h.status === step.key; }).pop();
          var isDone = idx < currentStep;
          var isActive = idx === currentStep;
          var cls = isDone ? 'done' : (isActive ? 'active' : '');
          var time = histEntry ? histEntry.time : '';
          
          // Fallback time for first step if no statusHistory exists
          if (step.key === 'pending' && !time && order.date) {
            time = order.date;
          }
          
          var note = histEntry ? histEntry.note : ((isDone || isActive) ? step.defaultNote : '');

          timelineHtml += '<div class="success-step ' + cls + '">'
            + '<div class="success-step__dot">' + (isDone || isActive ? '✓' : '') + '</div>'
            + '<div class="success-step__label">' + step.label + '</div>'
            + (time ? '<div class="success-step__time">' + time + '</div>' : '')
            + (note && (isDone || isActive) ? '<div class="success-step__note">' + note + '</div>' : '')
            + '</div>';
        });

        return '<h3 class="success-timeline-title">Tiến Độ Đơn Hàng</h3>'
          + '<div class="success-timeline">' + timelineHtml + '</div>';
      }

      // Render single order card
      function renderOrderCard(order, index) {
        var statusInfo = STATUS_MAP[order.status] || { text: order.status, cls: 'status-pending' };
        var totalVND = window.formatVND ? window.formatVND(order.total) : (order.total + '₫');
        
        // Build items HTML
        var itemsHtml = (order.items || []).map(function(item) {
          var priceVal = window.formatVND ? window.formatVND(item.price * item.qty) : ((item.price * item.qty) + '₫');
          
          // Image resolution logic (use item.image if present, else fallback based on name)
          var imgUrl = item.image;
          if (!imgUrl) {
            var cleanName = (item.name || '').toLowerCase().trim();
            if (cleanName.indexOf('lộc bình vẽ tay') >= 0) imgUrl = 'assets/images/product-1-1.jpg';
            else if (cleanName.indexOf('lộc bình men ra') >= 0 || cleanName.indexOf('lộc bình men rạn') >= 0) imgUrl = 'assets/images/product-2-1.jpg';
            else if (cleanName.indexOf('lộc bình trổ') >= 0) imgUrl = 'assets/images/product-3-1.jpg';
            else if (cleanName.indexOf('tranh gốm phúc lộc thọ') >= 0) imgUrl = 'assets/images/product-4-1.jpg';
            else if (cleanName.indexOf('bộ đồ thờ') >= 0 || cleanName.indexOf('chóe bày') >= 0) imgUrl = 'assets/images/product-5-1.jpg';
            else if (cleanName.indexOf('bình hút lộc') >= 0 || cleanName.indexOf('bình hoa sen') >= 0) imgUrl = 'assets/images/product-6-1.jpg';
            else if (cleanName.indexOf('chum ngâm rượu') >= 0 || cleanName.indexOf('chum rượu') >= 0) imgUrl = 'assets/images/product-7-1.jpg';
            else if (cleanName.indexOf('đĩa gốm') >= 0 || cleanName.indexOf('đĩa cảnh') >= 0) imgUrl = 'assets/images/product-8-1.jpg';
            else if (cleanName.indexOf('tượng gốm di lặc') >= 0) imgUrl = 'assets/images/product-3-1.jpg';
            else imgUrl = 'assets/images/placeholder.jpg';
          }

          var isVideo = /\.(mp4|mov|avi|webm|ogg)$/i.test(imgUrl);
          var mediaHtml = isVideo
            ? '<video src="' + imgUrl + '" autoplay loop muted playsinline onclick="openImgModal(\'' + imgUrl + '\')" style="width: 48px; height: 48px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; cursor: pointer;"></video>'
            : '<img src="' + imgUrl + '" alt="' + item.name + '" onclick="openImgModal(\'' + imgUrl + '\')" style="width: 48px; height: 48px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.15); flex-shrink: 0; cursor: pointer;">';

          var displayName = item.size ? item.name + ' - ' + item.size : item.name;

          return [
            '<div class="success-item-row" style="display: flex; align-items: center; justify-content: space-between; gap: var(--space-4); margin-bottom: var(--space-3); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: var(--space-2);">',
              '<div style="display: flex; align-items: center; gap: var(--space-3);">',
                mediaHtml,
                '<div style="display: flex; flex-direction: column; text-align: left;">',
                  (item.productId ? '<a href="product-detail.html?id=' + item.productId + '" target="_blank" class="success-item-row__name" style="color: #ffffff; font-weight: 500; font-size: var(--fs-sm); text-decoration: none; transition: color 0.2s;" onmouseover="this.style.color=\'var(--color-accent)\'" onmouseout="this.style.color=\'#ffffff\'">' + displayName + '</a>' : '<span class="success-item-row__name" style="color: #ffffff; font-weight: 500; font-size: var(--fs-sm);">' + displayName + '</span>'),
                  '<span style="font-size: var(--fs-xs); color: rgba(255,255,255,0.5); margin-top: 2px;">Số lượng: ' + item.qty + '</span>',
                '</div>',
              '</div>',
              '<span class="success-item-row__price" style="color: var(--color-accent); font-weight: 600; font-size: var(--fs-sm);">' + priceVal + '</span>',
            '</div>'
          ].join('');
        }).join('');

        // Build discount line if applied
        var discountRowHtml = '';
        if (order.discount && order.discount > 0) {
          var discountVal = window.formatVND ? window.formatVND(order.discount) : (order.discount + '₫');
          discountRowHtml = '<div class="success-item-row" style="color: #6ec96e; margin-bottom: var(--space-2);"><span>Giảm giá</span><span>−' + discountVal + '</span></div>';
        }

        var timelineCardHtml = renderTimelineHtml(order);

        // Map API properties
        var rName = order.customerName || order.name || 'Quý khách';
        var rPhone = order.customerPhone || order.phone || '';
        var rAddress = order.address || '';
        var rPayment = order.paymentMethod || 'Thanh toán khi nhận hàng (COD)';

        return [
          '<div class="order-summary-card">',
            '<div class="order-summary-header">',
              '<div class="order-header-info">',
                '<span class="order-code-badge">' + order.orderCode + '</span>',
                '<span class="order-date-label">Ngày đặt: ' + order.date + '</span>',
              '</div>',
              '<span class="order-badge-status ' + statusInfo.cls + '">' + statusInfo.text + '</span>',
            '</div>',
            '<div class="order-summary-body">',
              '<div class="order-quick-details">',
                '<p>Người nhận: <strong>' + rName + '</strong></p>',
                '<p>SĐT: ' + rPhone + '</p>',
                '<p>Địa chỉ: ' + rAddress + '</p>',
              '</div>',
              '<div class="order-total-price">',
                '<span class="label">Tổng thanh toán</span>',
                '<span class="price">' + totalVND + '</span>',
              '</div>',
            '</div>',
            '<div class="order-summary-footer">',
              '<button type="button" class="btn-toggle-details" onclick="toggleOrderDetails(' + index + ')">XEM TIẾN TRÌNH & CHI TIẾT</button>',
            '</div>',
            
            // Nested details drawer (dark themed matching order-success.html)
            '<div class="order-details-drawer" id="order-drawer-' + index + '">',
              '<div class="success-order-box">',
                '<div class="success-grid">',
                  '<div>',
                    '<p class="success-grid__title">Thông tin giao nhận</p>',
                    '<p><strong>' + rName + '</strong></p>',
                    '<p style="color: rgba(255,255,255,0.6); margin-top: 2px;">' + rPhone + '</p>',
                    '<p style="margin-top: 4px; color: rgba(255,255,255,0.45); font-size: var(--fs-xs); line-height: 1.5;">' + rAddress + '</p>',
                    (order.customerNote ? '<p class="success-grid__note" style="display:block; margin-top:8px; color:var(--accent); font-weight:600;"><i class="fas fa-comment-dots"></i> Lời dặn: ' + order.customerNote + '</p>' : ''),
                  '</div>',
                  '<div>',
                    '<p class="success-grid__title">Hình thức thanh toán</p>',
                    '<p><strong>' + rPayment + '</strong></p>',
                  '</div>',
                '</div>',
                '<div class="success-order-items">',
                  '<p class="success-items-title">Sản phẩm đã đặt</p>',
                  itemsHtml,
                '</div>',
                discountRowHtml,
                '<div class="success-order-total">',
                  '<span class="success-order-total__label">Tổng thanh toán</span>',
                  '<span class="success-order-total__val">' + totalVND + '</span>',
                '</div>',
                '<div class="success-timeline-card">',
                  timelineCardHtml,
                '</div>',
              '</div>',
            '</div>',
          '</div>'
        ].join('');
      }

      // Render multiple orders list
      function renderOrdersList(orders) {
        var container = document.getElementById('tracking-results-container');
        if (!container) return;

        if (orders.length === 0) {
          container.innerHTML = '';
          return;
        }

        var html = orders.map(function(order, idx) {
          return renderOrderCard(order, idx);
        }).join('');

        container.innerHTML = html;
      }

      // Modal functions
      window.openImgModal = function(src) {
        var modal = document.getElementById('product-img-modal');
        if (modal) {
          var isVideo = /\.(mp4|mov|avi|webm|ogg)$/i.test(src);
          // Remove old content except close button
          var contentNodes = modal.querySelectorAll('.img-modal-content');
          contentNodes.forEach(function(n) { n.remove(); });
          
          if (isVideo) {
             var vid = document.createElement('video');
             vid.className = 'img-modal-content';
             vid.src = src;
             vid.controls = true;
             vid.autoplay = true;
             vid.style.maxWidth = '90%';
             vid.style.maxHeight = '90vh';
             vid.style.objectFit = 'contain';
             modal.appendChild(vid);
          } else {
             var img = document.createElement('img');
             img.className = 'img-modal-content';
             img.src = src;
             modal.appendChild(img);
          }
          modal.style.display = 'flex';
        }
      };

      window.closeImgModal = function(e) {
        if (!e.target.classList.contains('img-modal-content')) {
          var modal = document.getElementById('product-img-modal');
          if (modal) {
             modal.style.display = 'none';
             // Pause video if playing
             var vid = modal.querySelector('video.img-modal-content');
             if (vid) vid.pause();
          }
        }
      };

      // Display alert banner
      function showAlert(message, type) {
        var area = document.getElementById('notification-area');
        if (!area) return;
        
        var cls = type === 'error' ? 'alert-error' : (type === 'success' ? 'alert-success' : 'alert-info');
        area.innerHTML = '<div class="tracking-alert ' + cls + '">' + message + '</div>';
        
        // Clear after a few seconds if it is success or info
        if (type !== 'error') {
          setTimeout(function() {
            area.innerHTML = '';
          }, 5000);
        }
      }

      function clearAlert() {
        var area = document.getElementById('notification-area');
        if (area) area.innerHTML = '';
      }

      // Search Handler
      window.handleTrackingSearch = function(e) {
        if (e) e.preventDefault();
        
        var query = document.getElementById('search-query-input').value.trim();
        if (!query) return;

        clearAlert();
        
        var allOrders = loadAllOrders();
        var normalizedQuery = query.replace(/\s+/g, '').toLowerCase();
        var queryDigits = query.replace(/\D/g, '');

        // 1. Search locally
        var filtered = allOrders.filter(function(order) {
          var codeMatch = order.orderCode.toLowerCase() === normalizedQuery;
          var phoneMatch = false;
          if (queryDigits && queryDigits.length >= 8) {
            var orderPhoneDigits = order.phone.replace(/\D/g, '');
            phoneMatch = orderPhoneDigits.endsWith(queryDigits) || queryDigits.endsWith(orderPhoneDigits);
          }
          return codeMatch || phoneMatch;
        });

        // 2. If Order Code search or we have local results, query real-time backend API
        var isOrderCodeQuery = normalizedQuery.startsWith('dh') || normalizedQuery.startsWith('pgt') || (query.length >= 5 && !queryDigits);

        if (isOrderCodeQuery) {
          var searchBtn = document.getElementById('btn-search-tracking');
          if (searchBtn) searchBtn.disabled = true;
          
          window.PhucGiaTienAPI.getOrder(query)
            .then(function(liveOrder) {
              if (searchBtn) searchBtn.disabled = false;
              
              var orderData = {
                orderCode: liveOrder.orderCode,
                date: liveOrder.date,
                timestamp: Date.now(),
                name: liveOrder.customerName,
                phone: liveOrder.customerPhone,
                address: liveOrder.address,
                customerNote: liveOrder.customerNote,
                paymentMethod: 'Thanh toán khi nhận hàng (COD)',
                items: (liveOrder.items || []).map(function(i) {
                  return { name: i.name, qty: i.qty, price: i.price, size: i.size, image: i.image || '', productId: i.productId };
                }),
                total: liveOrder.total,
                status: liveOrder.status,
                statusHistory: liveOrder.statusHistory || []
              };

              // Sync to localStorage
              var all = loadAllOrders();
              var idx = all.findIndex(function(x) { return x.orderCode.toLowerCase() === liveOrder.orderCode.toLowerCase(); });
              if (idx >= 0) {
                all[idx] = orderData;
              } else {
                all.unshift(orderData);
              }
              localStorage.setItem('pgt_orders', JSON.stringify(all));

              showAlert('Tìm thấy thông tin đơn hàng thời gian thực!', 'success');
              renderOrdersList([orderData]);
            })
            .catch(function(err) {
              if (searchBtn) searchBtn.disabled = false;
              
              if (filtered.length > 0) {
                showAlert('Tìm thấy đơn hàng từ lịch sử trình duyệt (Chế độ offline)!', 'info');
                renderOrdersList(filtered);
              } else {
                showAlert('Không tìm thấy đơn hàng phù hợp. Vui lòng kiểm tra lại Số điện thoại hoặc Mã đơn hàng.', 'error');
                renderOrdersList([]);
              }
            });
        } else {
          // Searching by phone
          if (filtered.length > 0) {
            showAlert('Tìm thấy ' + filtered.length + ' đơn hàng trong lịch sử trình duyệt!', 'success');
            renderOrdersList(filtered);
            
            // Background sync for latest statuses
            filtered.forEach(function(localOrder, fIdx) {
              if (fIdx < 3 && window.PhucGiaTienAPI && typeof window.PhucGiaTienAPI.getOrder === 'function') {
                window.PhucGiaTienAPI.getOrder(localOrder.orderCode)
                  .then(function(liveOrder) {
                    localOrder.status = liveOrder.status;
                    localOrder.customerNote = liveOrder.customerNote;
                    localOrder.total = liveOrder.total;
                    
                    var all = loadAllOrders();
                    var aIdx = all.findIndex(function(x) { return x.orderCode.toLowerCase() === localOrder.orderCode.toLowerCase(); });
                    if (aIdx >= 0) {
                      all[aIdx].status = liveOrder.status;
                      all[aIdx].customerNote = liveOrder.customerNote;
                      all[aIdx].total = liveOrder.total;
                      localStorage.setItem('pgt_orders', JSON.stringify(all));
                    }
                    renderOrdersList(filtered);
                  })
                  .catch(function() {});
              }
            });
          } else {
            showAlert('Không tìm thấy đơn hàng phù hợp. Vui lòng kiểm tra lại Số điện thoại hoặc Mã đơn hàng.', 'error');
            renderOrdersList([]);
          }
        }
      };

      // Toggle details drawer
      window.toggleOrderDetails = function(index) {
        var drawer = document.getElementById('order-drawer-' + index);
        if (!drawer) return;
        drawer.classList.toggle('active');
        
        // Update button text
        var btn = drawer.previousElementSibling.querySelector('.btn-toggle-details');
        if (btn) {
          if (drawer.classList.contains('active')) {
            btn.textContent = 'ẨN TIẾN TRÌNH & CHI TIẾT';
          } else {
            btn.textContent = 'XEM TIẾN TRÌNH & CHI TIẾT';
          }
        }
      };

      // Initialize page on load
      function initTrackingPage() {
        var currentUser = null;
        try {
          currentUser = JSON.parse(localStorage.getItem('current_user'));
        } catch(e) {}
        
        var token = localStorage.getItem('customer_token');
        var searchCardContainer = document.getElementById('search-card-container');
        var resultsContainer = document.getElementById('tracking-results-container');
        
        if (currentUser && token) {
          if (searchCardContainer) searchCardContainer.style.display = 'none';
          
          var fullName = currentUser.name || [currentUser.firstName, currentUser.lastName].filter(Boolean).join(' ') || 'Quý khách';
          var titleHtml = '<div style="text-align: center; margin-bottom: var(--space-8);">' +
                          '<h2 class="tracking-title" style="margin-bottom: var(--space-2);">Lịch Sử Đơn Hàng</h2>' +
                          '<p style="color: var(--color-accent); font-weight: 600; font-size: var(--fs-md);">Xin chào, ' + fullName + '</p>' +
                          '</div>';
          
          resultsContainer.insertAdjacentHTML('beforebegin', titleHtml);
          resultsContainer.innerHTML = '<div style="text-align: center; color: #8a6a50;">Đang tải danh sách đơn hàng...</div>';

          if (window.PhucGiaTienAPI && typeof window.PhucGiaTienAPI.getCustomerOrders === 'function') {
            window.PhucGiaTienAPI.getCustomerOrders()
              .then(function(userOrders) {
                if (userOrders && userOrders.length > 0) {
                  renderOrdersList(userOrders);
                } else {
                  resultsContainer.innerHTML = '<div style="text-align: center; color: #8a6a50;">Bạn chưa có đơn hàng nào.</div>';
                }
              })
              .catch(function(err) {
                resultsContainer.innerHTML = '<div class="tracking-alert alert-error">Không thể tải danh sách đơn hàng.</div>';
              });
          }
        } else {
          // Guest / Not logged-in state: show search card
          if (searchCardContainer) {
            searchCardContainer.style.display = 'block';
            // Add a login prompt below the form
            var loginPrompt = '<p style="text-align: center; margin-top: var(--space-6); font-size: var(--fs-sm); color: #6b4c2e;">' +
                              'Đã có tài khoản? <a href="login.html" style="color: var(--color-accent); font-weight: 600; text-decoration: underline;">Đăng nhập ngay</a> để xem toàn bộ lịch sử đơn hàng.' +
                              '</p>';
            if (!searchCardContainer.innerHTML.includes('Đã có tài khoản?')) {
              searchCardContainer.insertAdjacentHTML('beforeend', loginPrompt);
            }
          }

          var allOrders = loadAllOrders();
          if (allOrders.length > 0) {
            allOrders.sort(function(a, b) { return (b.timestamp || 0) - (a.timestamp || 0); });
            var recentTitleHtml = '<div style="text-align: center; margin-bottom: var(--space-8);"><h2 class="tracking-title" id="recent-orders-title">Đơn Hàng Gần Đây</h2></div>';
            
            // Prevent duplicate titles if re-rendering
            if (!document.getElementById('recent-orders-title')) {
                resultsContainer.insertAdjacentHTML('beforebegin', recentTitleHtml);
            }
            
            renderOrdersList(allOrders);
            
            // Background sync for recent orders to ensure fresh status
            allOrders.forEach(function(localOrder, fIdx) {
              if (fIdx < 3 && window.PhucGiaTienAPI && typeof window.PhucGiaTienAPI.getOrder === 'function') {
                window.PhucGiaTienAPI.getOrder(localOrder.orderCode)
                  .then(function(liveOrder) {
                    localOrder.status = liveOrder.status;
                    localOrder.customerNote = liveOrder.customerNote;
                    localOrder.total = liveOrder.total;
                    
                    var all = loadAllOrders();
                    var aIdx = all.findIndex(function(x) { return x.orderCode.toLowerCase() === localOrder.orderCode.toLowerCase(); });
                    if (aIdx >= 0) {
                      all[aIdx].status = liveOrder.status;
                      all[aIdx].customerNote = liveOrder.customerNote;
                      all[aIdx].total = liveOrder.total;
                      localStorage.setItem('pgt_orders', JSON.stringify(all));
                    }
                    renderOrdersList(allOrders);
                  })
                  .catch(function() {});
              }
            });
          }
          
          // Optionally, pre-fill search input if query string is present (e.g. ?code=PGT123)
          var params = new URLSearchParams(window.location.search);
          var codeParam = params.get('code') || params.get('phone');
          if (codeParam) {
            var input = document.getElementById('search-query-input');
            if (input) {
              input.value = codeParam;
              window.handleTrackingSearch();
            }
          }
        }
      }

      // Wait for components to load then initialize
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          setTimeout(initTrackingPage, 500);
        });
      } else {
        setTimeout(initTrackingPage, 500);
      }
    })();
  </script>
</body>

</html>
