<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Khôi phục mật khẩu tài khoản Phúc Gia Tiên.">
  <title>Khôi phục mật khẩu – Phúc Gia Tiên</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="assets/images/logo.png" type="image/png">
  <style>
    /* Similar styles to login.html */
    .page-hero {
      position: relative;
      background: #3B2612;
      color: #fff;
      padding: var(--space-8) 0 var(--space-6);
      text-align: center;
      margin-bottom: var(--space-8);
      overflow: hidden;
    }

    .page-hero__bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0.25;
      z-index: 1;
    }

    .page-hero__bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .page-hero__content {
      position: relative;
      z-index: 2;
    }

    .page-hero__title {
      font-family: var(--font-heading);
      font-size: var(--fs-4xl);
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-3);
      text-transform: uppercase;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .auth-section {
      padding-bottom: 80px;
    }

    .auth-container {
      max-width: 480px;
      margin: 0 auto;
      background: #faf7f2;
      border: 1px solid #eae1d6;
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(59, 38, 18, 0.05);
    }

    .auth-heading {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 600;
      color: #2C1A0C;
      margin-bottom: 6px;
      text-align: center;
    }

    .auth-sub {
      font-size: 14px;
      color: #6B5740;
      margin-bottom: 32px;
      text-align: center;
    }

    .auth-input-group {
      margin-bottom: 20px;
    }

    .auth-input-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #5C3A1E;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .auth-input-wrap {
      position: relative;
    }

    .auth-input-field {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid #eae1d6;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 14px;
      color: #1A0F05;
      background: #fff;
      transition: all 0.2s ease;
    }

    .auth-input-field:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 4px rgba(200, 146, 42, 0.1);
    }

    .auth-error-hint {
      font-size: 12px;
      color: #C0392B;
      margin-top: 6px;
      display: none;
    }

    .auth-btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 12px;
    }

    .auth-btn-submit:hover {
      background: var(--color-primary-light);
      box-shadow: 0 8px 24px rgba(59, 38, 18, 0.25);
      transform: translateY(-2px);
    }

    .auth-eye-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0;
      color: #b09470;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .auth-eye-toggle:hover {
      color: var(--color-accent);
    }

    .step-panel {
      display: none;
    }
    .step-panel.active {
      display: block;
    }

    .auth-link {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s ease;
      display: block;
      text-align: center;
      margin-top: 20px;
    }

    .auth-link:hover {
      color: var(--color-accent-hover);
      text-decoration: underline;
    }
    
    #otp-timer {
        color: #C0392B;
        font-weight: 600;
        font-size: 13px;
        margin-top: 10px;
        text-align: right;
    }
  </style>
</head>

<body class="page-body">

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <main id="forgot-password-page">
    
    <!-- PAGE HERO -->
    <section class="page-hero">
      <div class="page-hero__bg">
        <img class="js-config-page-banner-img" src="assets/images/home_bg.jpeg" alt="Phúc Gia Tiên Banner">
      </div>
      <div class="container">
        <div class="page-hero__content">
          <h1 class="page-hero__title">KHÔI PHỤC MẬT KHẨU</h1>
        </div>
      </div>
    </section>

    <!-- AUTH SECTION -->
    <section class="auth-section">
      <div class="container">
        <div class="auth-container">
          
          <!-- STEP 1: REQUEST EMAIL -->
          <div class="step-panel active" id="step1">
            <h3 class="auth-heading">Quên mật khẩu</h3>
            <p class="auth-sub">Vui lòng nhập Email để nhận liên kết khôi phục.</p>
            
            <form id="form-step1" onsubmit="handleRequestReset(event)">
              <div class="auth-input-group">
                <label class="auth-input-label" for="reset-email">Email</label>
                <div class="auth-input-wrap">
                  <input class="auth-input-field" id="reset-email" type="email" placeholder="Nhập email của bạn..." required>
                </div>
              </div>
              <button type="submit" class="auth-btn-submit" id="btn-request-reset">Gửi yêu cầu</button>
            </form>
            <a href="login.html" class="auth-link">← Quay lại Đăng nhập</a>
          </div>

          <!-- STEP 3: RESET PASSWORD -->
          <div class="step-panel" id="step3">
            <h3 class="auth-heading">Đặt lại mật khẩu</h3>
            <p class="auth-sub">Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>
            
            <form id="form-step3" onsubmit="handleResetPassword(event)">
              <div class="auth-input-group">
                <label class="auth-input-label" for="reset-new-pass">Mật khẩu mới</label>
                <div class="auth-input-wrap">
                  <input class="auth-input-field" id="reset-new-pass" type="password" placeholder="Tối thiểu 5 ký tự" required minlength="5">
                  <button type="button" class="auth-eye-toggle" onclick="toggleAuthPass('reset-new-pass')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>
              <div class="auth-input-group">
                <label class="auth-input-label" for="reset-confirm-pass">Xác nhận mật khẩu</label>
                <div class="auth-input-wrap">
                  <input class="auth-input-field" id="reset-confirm-pass" type="password" placeholder="Nhập lại mật khẩu" required minlength="5">
                  <button type="button" class="auth-eye-toggle" onclick="toggleAuthPass('reset-confirm-pass')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
              </div>
              <button type="submit" class="auth-btn-submit" id="btn-reset-pass">Đổi mật khẩu</button>
            </form>
          </div>

        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <!-- SCRIPTS -->
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/common.js"></script>
  
  <script>
    let currentEmailOrPhone = '';
    let currentTokenOrOtp = '';
    let otpTimerInterval = null;

    function toggleAuthPass(id) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
      } else {
        input.type = 'password';
      }
    }

    function switchStep(step) {
      document.querySelectorAll('.step-panel').forEach(el => el.classList.remove('active'));
      document.getElementById('step' + step).classList.add('active');
    }

    // Step 1: Request Link
    async function handleRequestReset(e) {
      if (e) e.preventDefault();
      
      const inputVal = document.getElementById('reset-email').value.trim();
      if (!inputVal) {
        window.showToast('Vui lòng nhập Email', 'error');
        return;
      }
      
      const btn = document.getElementById('btn-request-reset');
      btn.disabled = true;
      btn.textContent = 'Đang xử lý...';

      try {
        const res = await window.PhucGiaTienAPI.forgotPassword(inputVal);
        window.showToast(res.message, 'success');
        currentEmailOrPhone = inputVal;
        
        // Cứ giữ nguyên trang để user đọc thông báo
        btn.textContent = 'Đã gửi yêu cầu';
      } catch (err) {
        window.showToast(err.message || 'Có lỗi xảy ra, vui lòng thử lại', 'error');
        btn.disabled = false;
        btn.textContent = 'Gửi yêu cầu';
      }
    }

    // Step 3: Reset Password
    async function handleResetPassword(e) {
      e.preventDefault();
      const pass = document.getElementById('reset-new-pass').value;
      const confirm = document.getElementById('reset-confirm-pass').value;

      if (pass.length < 5) {
        window.showToast('Mật khẩu phải từ 5 ký tự trở lên', 'error');
        return;
      }
      if (pass !== confirm) {
        window.showToast('Mật khẩu xác nhận không khớp', 'error');
        return;
      }

      const btn = document.getElementById('btn-reset-pass');
      btn.disabled = true;
      btn.textContent = 'Đang đổi mật khẩu...';

      try {
        const res = await window.PhucGiaTienAPI.resetPassword(currentEmailOrPhone, currentTokenOrOtp, pass);
        window.showToast(res.message, 'success');
        
        // Redirect to login after 1.5s
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      } catch (err) {
        window.showToast(err.message || 'Lỗi khi đổi mật khẩu', 'error');
        btn.disabled = false;
        btn.textContent = 'Đổi mật khẩu';
      }
    }

    // Check if loaded from email link
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const email = urlParams.get('email');
      
      if (token && email) {
        currentEmailOrPhone = email;
        currentTokenOrOtp = token;
        switchStep(3); // Go straight to reset step
      }
    })();

  </script>
</body>
</html>
