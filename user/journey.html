<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Hành trình của Phúc Gia Tiên – câu chuyện 2 vợ chồng cùng nhau gìn giữ nghề gốm sứ thủ công Bát Tràng.">
  <title>Hành Trình – Phúc Gia Tiên</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Be+Vietnam+Pro:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    /* ===== JOURNEY PAGE SPECIFIC STYLES ===== */


    /* Story Tabs */
    .story-tabs {
      display: flex;
      gap: var(--space-2);
      border-bottom: 1px solid var(--color-border);
      margin-bottom: var(--space-8);
      padding-bottom: 0;
    }

    .story-tab-btn {
      padding: var(--space-3) var(--space-5);
      font-size: var(--fs-sm);
      font-weight: var(--fw-semibold);
      color: var(--color-primary-light);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
      background: transparent;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .story-tab-btn:hover {
      color: var(--color-primary-dark);
      opacity: 1;
    }

    .story-tab-btn.active {
      color: var(--color-accent);
      border-bottom-color: var(--color-accent);
      font-weight: var(--fw-bold);
    }

    .story-panel {
      display: none;
    }

    .story-panel.active {
      display: block;
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Timeline */
    .timeline {
      position: relative;
      padding-left: var(--space-10);
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 16px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--color-accent), transparent);
    }

    .timeline-item {
      position: relative;
      margin-bottom: var(--space-10);
      padding-left: var(--space-8);
    }

    .timeline-item::before {
      content: '';
      position: absolute;
      left: -18px;
      top: 6px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--color-accent);
      border: 2px solid var(--color-bg-dark);
      box-shadow: 0 0 0 3px rgba(212, 168, 83, 0.25);
    }

    .timeline-item__date {
      font-size: var(--fs-base);
      font-weight: var(--fw-bold);
      color: var(--color-accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: var(--space-2);
    }

    .timeline-item__title {
      font-family: var(--font-heading);
      font-size: var(--fs-xl);
      font-weight: var(--fw-bold);
      color: var(--color-accent);
      margin-bottom: var(--space-3);
    }

    .timeline-item__desc {
      font-size: var(--fs-base);
      color: var(--color-primary);
      line-height: 1.8;
    }

    /* Video grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-5);
    }
    @media (max-width: 1024px) {
      .video-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 640px) {
      .video-grid {
        grid-template-columns: 1fr;
      }
    }

    .video-card {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      aspect-ratio: 16/9;
      background: var(--color-bg-card);
      cursor: pointer;
      border: 1px solid var(--color-border);
      transition: transform var(--transition-normal), box-shadow var(--transition-normal);
    }

    .video-card:hover {
      transform: translateY(-4px) !important;
      box-shadow: var(--shadow-md);
    }

    .video-card__thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video-card__overlay {
      position: absolute;
      inset: 0;
      background: rgba(26, 15, 5, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
    }

    .video-card__play {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(212, 168, 83, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      transition: transform var(--transition-normal), background var(--transition-normal);
    }

    .video-card:hover .video-card__play {
      transform: scale(1.1);
      background: var(--color-accent);
    }

    .video-card__duration {
      font-size: var(--fs-xs);
      color: var(--color-text-primary);
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
    }

    .video-card__title {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: var(--space-3) var(--space-4);
      background: linear-gradient(to top, rgba(26, 15, 5, 0.9), transparent);
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      color: var(--color-text-primary);
    }

    .btn-load-more {
      width: fit-content;
      display: block;
      color: var(--color-accent);
      background-color: var(--color-bg-card);
      margin: var(--space-8) auto 0;
      transition: transform 0.25s ease,
        opacity 0.25s ease;
    }

    .btn-load-more:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
  </style>
  <link rel="icon" href="assets/images/logo.png" type="image/png">
</head>

<body class="page-body">

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <main id="main-content">

    <!-- PAGE HERO -->
    <section class="page-hero" aria-label="Hành trình Phúc Gia Tiên">
      <div class="page-hero__bg">
        <img class="js-config-journey-banner-img" src="assets/images/journey-hero.jpg" alt="" role="presentation" loading="eager">
      </div>
      <div class="container">
        <div class="page-hero__content">
          <h1 class="page-hero__title">HÀNH TRÌNH</h1>
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <span class="breadcrumb__item"><a class="breadcrumb__link" href="index.html">Trang Chủ</a></span>
            <span class="breadcrumb__item"><span class="breadcrumb__current">Hành Trình</span></span>
          </nav>
        </div>
      </div>
    </section>

    <!-- STORY TABS SECTION – rendered dynamically by journey.js -->
    <section class="section section--dark" aria-labelledby="story-tabs-heading">
      <div class="container">
        <h2 id="story-tabs-heading" class="sr-only">Nội dung hành trình</h2>

        <!-- Tab buttons: rendered by journey.js -->
        <nav class="story-tabs" role="tablist" aria-label="Các tab hành trình" id="journey-tabs-container">
          <!-- JS will inject: "Tất cả" tab + one tab per topic -->
        </nav>

        <!-- Video grid: rendered by journey.js -->
        <div id="journey-videos-container">
          <!-- JS will inject video cards here -->
        </div>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="js/api.js?v=2"></script>
  <script src="js/cart.js?v=2"></script>
  <script src="js/common.js?v=2"></script>
  <script src="js/journey.js?v=2"></script>
</body>

</html>
