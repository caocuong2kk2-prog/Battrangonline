<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Xem chi tiết sản phẩm gốm sứ thủ công Bát Tràng của Phúc Gia Tiên – thông số, hình ảnh và mua hàng trực tuyến.">
  <title>Chi Tiết Sản Phẩm – Phúc Gia Tiên</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Be+Vietnam+Pro:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/product.css?v=2">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
</head>

<body class="page-body">

  <!-- HEADER -->
  <div id="header-placeholder"></div>

  <main id="main-content">

    <!-- BREADCRUMB -->
    <div class="section--sm section--mid">
      <div class="container">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <span class="breadcrumb__item"><a class="breadcrumb__link" href="index.html">Trang Chủ</a></span>
          <span class="breadcrumb__item"><a class="breadcrumb__link" href="products.html">Sản Phẩm</a></span>
          <span class="breadcrumb__item"><span class="breadcrumb__current" id="breadcrumb-product-name">Chi Tiết Sản
              Phẩm</span></span>
        </nav>
      </div>
    </div>

    <!-- PRODUCT DETAIL — populated by product.js -->
    <section class="product-detail section--dark" aria-label="Chi tiết sản phẩm">
      <div class="container">
        <div id="product-detail-container" aria-live="polite">
          <!-- JS renders product detail here -->
          <div class="spinner" style="margin: 4rem auto;"></div>
        </div>
      </div>
    </section>



  </main>

  <!-- Lightbox Modal -->
  <div id="lightboxModal" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index: 99999; display:none; background:rgba(0,0,0,0.9); flex-direction:column; align-items:center; justify-content:center; overflow:hidden;">
    <!-- Top toolbar -->
    <div style="position:absolute; top:0; left:0; right:0; height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; z-index:100001; background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent); pointer-events:none;">
      <div id="lbCounter" style="color:#fff; font-size:15px; font-family:sans-serif; pointer-events:auto;"></div>
      <div style="display:flex; align-items:center; gap:8px; pointer-events:auto;">
        <!-- Zoom controls -->
        <div id="lbZoomControls" style="display:flex; align-items:center; gap:6px; background:rgba(0,0,0,0.45); border-radius:24px; padding:4px 10px;">
          <button id="lbZoomOut" title="Thu nhỏ" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='none'">−</button>
          <span id="lbZoomLevel" style="color:#fff; font-size:12px; min-width:38px; text-align:center; font-family:sans-serif; user-select:none;">100%</span>
          <button id="lbZoomIn" title="Phóng to" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='none'">+</button>
          <button id="lbZoomReset" title="Về 100%" style="background:none; border:none; color:rgba(255,255,255,0.7); font-size:10px; cursor:pointer; padding:2px 6px; border-radius:4px; font-family:sans-serif; transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='none'">RESET</button>
        </div>
        <button id="lbClose" style="background:rgba(255,255,255,0.12); color:#fff; border:none; width:36px; height:36px; font-size:22px; cursor:pointer; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background 0.15s;" onmouseover="this.style.background='rgba(255,255,255,0.25)'" onmouseout="this.style.background='rgba(255,255,255,0.12)'">&times;</button>
      </div>
    </div>

    <!-- Nav arrows -->
    <button id="lbPrev" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); color:#fff; border:none; width:50px; height:50px; cursor:pointer; font-size:24px; border-radius:50%; z-index:100000; display:flex; align-items:center; justify-content:center; transition:background 0.15s;" onmouseover="this.style.background='rgba(0,0,0,0.8)'" onmouseout="this.style.background='rgba(0,0,0,0.5)'">&#10094;</button>
    <button id="lbNext" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); background:rgba(0,0,0,0.5); color:#fff; border:none; width:50px; height:50px; cursor:pointer; font-size:24px; border-radius:50%; z-index:100000; display:flex; align-items:center; justify-content:center; transition:background 0.15s;" onmouseover="this.style.background='rgba(0,0,0,0.8)'" onmouseout="this.style.background='rgba(0,0,0,0.5)'">&#10095;</button>

    <!-- Zoom hint -->
    <div id="lbHint" style="position:absolute; bottom:18px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.5); font-size:11px; font-family:sans-serif; pointer-events:none; white-space:nowrap;">
      Lăn chuột để zoom • Giữ và kéo khi đã phóng to • Nhấp đôi để reset
    </div>

    <!-- Media wrapper (overflow:hidden so zoomed content is clipped) -->
    <div id="lbViewport" style="position:relative; width:90vw; height:90vh; overflow:hidden; display:flex; align-items:center; justify-content:center;">
      <div id="lightboxMediaContainer" style="display:flex; align-items:center; justify-content:center; transform-origin:center center; transition:opacity 0.2s; will-change:transform;"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/common.js"></script>
  <script src="js/product.js?v=2"></script>
  <script>
    // Update breadcrumb after product loads
    document.addEventListener('DOMContentLoaded', function () {
      var observer = new MutationObserver(function () {
        var nameEl = document.querySelector('.product-info__name');
        var breadEl = document.getElementById('breadcrumb-product-name');
        if (nameEl && breadEl) {
          breadEl.textContent = nameEl.textContent;
          observer.disconnect();
        }
      });
      var container = document.getElementById('product-detail-container');
      if (container) observer.observe(container, { childList: true, subtree: true });
    });
  </script>
</body>

</html>
