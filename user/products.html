<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Khám phá bộ sưu tập gốm sứ thủ công Bát Tràng của Phúc Gia Tiên – lộc bình, đồ thờ, tranh gốm, bình hoa cao cấp.">
  <title>Sản Phẩm – Phúc Gia Tiên</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Be+Vietnam+Pro:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/product.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
</head>

<body class="page-body">

  <!-- HEADER (same on all pages) -->
  <div id="header-placeholder"></div>

  <main id="main-content">

    <!-- PAGE HERO -->
    <section class="page-hero" aria-label="Banner trang sản phẩm">
      <div class="page-hero__bg">
        <img class="js-config-products-banner-img" src="assets/images/products-banner.jpg" alt="" role="presentation" loading="eager">
      </div>
      <div class="container">
        <div class="page-hero__content">
          <h1 class="page-hero__title">SẢN PHẨM</h1>
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <span class="breadcrumb__item"><a class="breadcrumb__link" href="index.html">Trang Chủ</a></span>
            <span class="breadcrumb__item"><span class="breadcrumb__current">Sản Phẩm</span></span>
          </nav>
        </div>
      </div>
    </section>

    <!-- FILTER BAR -->
    <section class="section--sm section--dark" aria-label="Bộ lọc sản phẩm">
      <div class="container">
        <div class="filter-bar">
          <div class="filter-bar__group">
            <!-- Danh mục -->
            <div class="filter-bar__item">
              <label class="filter-bar__label" for="filter-category">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;opacity:.7"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Danh mục
              </label>
              <select class="filter-select" id="filter-category" aria-label="Lọc theo danh mục">
                <!-- populated by product.js -->
              </select>
            </div>

            <!-- Mức giá -->
            <div class="filter-bar__item">
              <label class="filter-bar__label" for="filter-price">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;opacity:.7"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Mức giá
              </label>
              <select class="filter-select" id="filter-price" aria-label="Lọc theo mức giá">
                <option value="all">Tất cả mức giá</option>
                <option value="under10">Dưới 10 triệu</option>
                <option value="10to20">10 – 20 triệu</option>
                <option value="20to50">20 – 50 triệu</option>
                <option value="above50">Trên 50 triệu</option>
              </select>
            </div>
          </div>

          <div class="filter-bar__sort">
            <span class="filter-bar__count" id="product-count" aria-live="polite">Đang tải...</span>
            <div class="filter-bar__item">
              <label class="filter-bar__label" for="sort-select">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px;opacity:.7"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>Sắp xếp
              </label>
              <select class="filter-select" id="sort-select" aria-label="Sắp xếp theo">
                <option value="newest">Mới Nhất</option>
                <option value="price-asc">Giá Tăng Dần</option>
                <option value="price-desc">Giá Giảm Dần</option>
              </select>
            </div>
          </div>
        </div>

        <!-- PRODUCT GRID -->
        <div class="product-grid" id="product-list-grid" role="list" aria-label="Danh sách sản phẩm" aria-live="polite">
          <!-- populated by product.js -->
        </div>

        <!-- PAGINATION -->
        <nav class="pagination" id="product-pagination" aria-label="Phân trang sản phẩm">
          <!-- populated by product.js -->
        </nav>
      </div>
    </section>

    <!-- ========== FEATURE BADGES ========== -->
    <section class="section--sm section--mid" aria-label="Cam kết chất lượng">
      <div class="container">
        <div class="feature-badges">
          <div class="feature-badge reveal" data-delay="0">
            <span class="feature-badge__icon">🏺</span>
            <div>
              <p class="feature-badge__title">Gốm Sứ Cao Cấp</p>
              <p class="feature-badge__desc">100% thủ công truyền thống</p>
            </div>
          </div>
          <div class="feature-badge reveal" data-delay="100">
            <span class="feature-badge__icon">🔥</span>
            <div>
              <p class="feature-badge__title">Chất Lượng Cao</p>
              <p class="feature-badge__desc">Nung 1.200°C lò truyền thống</p>
            </div>
          </div>
          <div class="feature-badge reveal" data-delay="200">
            <span class="feature-badge__icon">🚚</span>
            <div>
              <p class="feature-badge__title">Giao Hàng Toàn Quốc</p>
              <p class="feature-badge__desc">Ship COD, đóng gói an toàn</p>
            </div>
          </div>
          <div class="feature-badge reveal" data-delay="300">
            <span class="feature-badge__icon">💬</span>
            <div>
              <p class="feature-badge__title">Hỗ Trợ 24/7</p>
              <p class="feature-badge__desc">Tư vấn tận tình</p>
            </div>
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/common.js"></script>
  <script src="js/product.js"></script>
</body>

</html>
