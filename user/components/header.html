<!--
  header.html - Shared header component
  Include this via fetch() in common.js or copy-paste into each page.
  Phúc Gia Tiên - Gốm Sứ Thủ Công
-->
<header id="site-header" role="banner">
  <div class="container">
    <div class="header-inner">

      <!-- LOGO -->
      <a class="site-logo" href="index.html" aria-label="Phúc Gia Tiên - Trang Chủ">
        <img class="site-logo__img js-config-logo" src="assets/images/logo.png" alt="Logo Phúc Gia Tiên" width="44" height="44">
        <div class="site-logo__text">
          <span class="site-logo__name js-config-store-name">PHÚC GIA TIÊN</span>
        </div>
      </a>

      <!-- MAIN NAVIGATION -->
      <nav id="site-nav" aria-label="Menu chính" style="padding-left: 10px;">
        <ul class="nav-list" role="list">
          <li class="nav-list__item">
            <a class="nav-list__link" href="index.html">Trang Chủ</a>
          </li>
          <li class="nav-list__item">
            <a class="nav-list__link" href="products.html">Sản Phẩm</a>
          </li>
          <li class="nav-list__item">
            <a class="nav-list__link" href="journey.html">Hành Trình</a>
          </li>
          <li class="nav-list__item">
            <a class="nav-list__link" href="about.html">Giới Thiệu</a>
          </li>
          <li class="nav-list__item">
            <a class="nav-list__link" href="contact.html">Liên Hệ</a>
          </li>
        </ul>

      </nav>

      <!-- HEADER ACTIONS -->
      <div class="header-actions">
        <!-- Search trigger -->
        <button class="header-action-btn header-action-btn--search" id="search-trigger-btn" aria-label="Tìm kiếm" aria-expanded="false">
          <svg class="header-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>

        <!-- Cart Icon with Count -->
        <a class="header-action-btn header-action-btn--cart" href="cart.html" aria-label="Giỏ hàng">
          <svg class="header-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <span class="cart-count-badge" id="cart-count" style="display:none">0</span>
        </a>

        <!-- Login / User Icon -->
        <a class="header-action-btn header-action-btn--user" href="login.html" aria-label="Đăng nhập">
          <svg class="header-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </a>
      </div>

      <!-- MOBILE HAMBURGER -->
      <button
        class="nav-toggle"
        id="nav-toggle-btn"
        aria-label="Mở menu"
        aria-expanded="false"
        aria-controls="site-nav"
      >
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
        <span class="nav-toggle__bar"></span>
      </button>

    </div>
  </div>
</header>
